name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          BUILT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags="-s -w -X github.com/mshegolev/bqa-os/internal/version.Version=${VERSION} -X github.com/mshegolev/bqa-os/internal/version.Commit=${COMMIT} -X github.com/mshegolev/bqa-os/internal/version.BuildDate=${BUILT}" -o "dist/bqa-${{ matrix.suffix }}" ./cmd/bqa
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bqa-${{ matrix.suffix }}
          path: dist/bqa-${{ matrix.suffix }}
