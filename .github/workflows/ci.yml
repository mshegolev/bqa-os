name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Go and static demo QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install browser QA dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium

      - name: Run Go tests
        run: go test ./...

      - name: Run rendered browser layout QA
        env:
          BQA_BROWSER_QA: "1"
          BQA_PLAYWRIGHT_PYTHON: python3
        run: node --test docs/assets/game.test.js

      - name: Check whitespace
        run: git diff --check
